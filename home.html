<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="home_style.css">
    <title>home</title>
</head>

<body>
    <header class="header">
        <div class="header-logo"> .......</div>
        <div class="header-bar">
            <i class=" header-profile fa-solid fa-user" style="color: #6367ff;"></i>
            <div class="header-search">
                <input class="header-search-box" placeholder=" Search a location . ."></input>
                <button class="header-search-icon"><i class="fa-solid fa-magnifying-glass-location"
                        style="color: #6367ff;"></i></button>
            </div>
        </div>
    </header>
    <div class="schedule">
        <input type="radio" id="mon" name="weekend" value="Monday">
        <label for="mon">Monday</label>

        <input type="radio" id="tue" name="weekend" value="Tuesday">
        <label for="tue">Tuesday</label>

        <input type="radio" id="wed" name="weekend" value="Wednesday">
        <label for="wed">Wednesday</label>

        <input type="radio" id="thr" name="weekend" value="Thrusday">
        <label for="thr">Thrusday</label>

        <input type="radio" id="fri" name="weekend" value="Friday">
        <label for="fri">Friday</label>

        <input type="radio" id="sat" name="weekend" value="Saturday">
        <label for="sat">Saturday</label>

        <input type="radio" id="sun" name="weekend" value="Sunday">
        <label for="sun">Sunday</label>
    </div>
</body>

</html>
